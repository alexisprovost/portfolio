		<title>Alexis Provost - Portfolio</title>

		<!-- Preload LCP image -->
		<link rel="preload" as="image" type="image/avif" href="/images/profile.avif" />


		<link rel="apple-touch-icon" sizes="180x180" href="/src/assets/favicon/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/src/assets/favicon/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/src/assets/favicon/favicon-16x16.png" />

		<script>
			(function () {
				try {
					var stored = null;
					try { stored = localStorage.getItem("theme"); } catch (e) {}
					var theme = stored;
					if (theme !== "light" && theme !== "dark") {
						try {
							theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
						} catch (e) { theme = "light"; }
					}
					document.documentElement.setAttribute("data-theme", theme);
					var meta = document.getElementById("theme-color");
					if (meta) meta.setAttribute("content", theme === "dark" ? "#09090B" : "#FAFAFA");
				} catch (e) {}
			})();
		</script>
		<style>
			html { background-color: #FAFAFA; color-scheme: light; }
			html[data-theme="dark"] { background-color: #09090B; color-scheme: dark; }
			body { background-color: #FAFAFA; margin: 0; }
			html[data-theme="dark"] body { background-color: #09090B; }
			/* iOS 26 toolbar tinting: Safari samples a fixed element near the top edge IF it is >=3px tall, >=80% wide, and within 4px of the top. High z-index so it wins over Toaster/page headers. */
			#theme-sampler { position: fixed; top: 0; left: 0; right: 0; height: 6px; z-index: 9999; pointer-events: none; background-color: #FAFAFA; }
			html[data-theme="dark"] #theme-sampler { background-color: #09090B; }
		</style>
	</head>
	<body>
		<div id="theme-sampler"></div>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
